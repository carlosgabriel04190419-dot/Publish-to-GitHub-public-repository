<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control | CarzaD'Cross</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <style>
        body { background-color: #0a0a0f; color: white; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        
        .admin-header { display: flex; justify-content: space-between; align-items: center; background: #1a1a24; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        
        .admin-table-container { background: #1a1a24; border-radius: 12px; padding: 20px; overflow-x: auto; border: 1px solid #333; margin-bottom: 30px; }
        .highlight-container { border: 1px solid #a155ff; box-shadow: 0 0 15px rgba(161, 85, 255, 0.1); }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #333; }
        th { color: #a155ff; font-weight: bold; }
        
        .btn-add { background: #00e676; color: black; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .btn-add:hover { background: #00c853; }
        
        .btn-complete { background: #a155ff; color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.3s; }
        .btn-complete:hover { background: #8b3dff; box-shadow: 0 0 10px rgba(161,85,255,0.4); }
        
        .search-bar { background: #2a2a35; border: 1px solid #444; color: white; padding: 10px 15px; border-radius: 8px; width: 300px; outline: none; }
        
        .status-pending { background: rgba(255, 193, 7, 0.15); color: #ffc107; padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; display: inline-block; }
    </style>
</head>
<body>

    <div class="admin-header">
        <div>
            <h1 style="margin: 0; color: #a155ff; display: flex; align-items: center; gap: 10px;">
                <span class="material-icons">admin_panel_settings</span> Backoffice CarzaD'Cross
            </h1>
            <p style="margin: 5px 0 0 0; color: #a8a8b3;">Gestión de usuarios y recargas de saldo.</p>
        </div>
        <button class="btn-outline" onclick="window.location.href='index.html'">Volver a la Tienda</button>
    </div>

    <!-- ============================================== -->
    <!-- NUEVA SECCIÓN: PEDIDOS PENDIENTES              -->
    <!-- ============================================== -->
    <div class="admin-table-container highlight-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0; display: flex; align-items: center; gap: 10px;">
                <span class="material-icons" style="color: #a155ff;">shopping_cart</span> Pedidos Pendientes
            </h2>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Usuario</th>
                    <th>Paquete Solicitado</th>
                    <th>ID del Juego</th>
                    <th>Estado</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tabla-pedidos">
                <tr><td colspan="6" style="text-align: center; color: #a8a8b3;">Cargando pedidos...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- ============================================== -->
    <!-- SECCIÓN EXISTENTE: LISTA DE USUARIOS           -->
    <!-- ============================================== -->
    <div class="admin-table-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0;">Lista de Usuarios</h2>
            <input type="text" id="buscador" class="search-bar" placeholder="🔍 Buscar por Nickname..." onkeyup="filtrarUsuarios()">
        </div>

        <table>
            <thead>
                <tr>
                    <th>Nickname</th>
                    <th>Correo</th>
                    <th>Celular</th>
                    <th>Saldo Actual</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tabla-usuarios">
                <tr><td colspan="5" style="text-align: center;">Cargando usuarios...</td></tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // --- SISTEMA DE SEGURIDAD BÁSICO ---
        const passwordAdmin = "CarzaAdmin"; 
        let intento = prompt("🔒 Área Restringida. Ingresa la contraseña de Administrador:");
        if (intento !== passwordAdmin) {
            alert("Acceso denegado.");
            window.location.href = "index.html"; 
        }

        // --- CONFIGURACIÓN SUPABASE ---
        const supabaseUrl = 'https://kskynakwlglwmliffcnx.supabase.co';
        const supabaseKey = 'sb_publishable_piAkvgxqryyzBfvbeIvTNw_MD_U4OjF';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        let todosLosUsuarios = []; 

        window.onload = async function() {
            await cargarUsuarios();
            await cargarPedidos();
        };

        // ==========================================
        // LÓGICA DE PEDIDOS
        // ==========================================
        async function cargarPedidos() {
            // Solo traemos los pedidos que digan "Pendiente"
            const { data, error } = await supabaseClient
                .from('pedidos')
                .select('*')
                .eq('estado', 'Pendiente')
                .order('created_at', { ascending: true }); // Los más antiguos primero

            const tbody = document.getElementById('tabla-pedidos');
            tbody.innerHTML = "";

            if (error || !data || data.length === 0) {
                tbody.innerHTML = "<tr><td colspan='6' style='text-align: center; color: #a8a8b3;'>✅ No hay pedidos pendientes. ¡Todo al día!</td></tr>";
                return;
            }

            data.forEach(pedido => {
                const fecha = new Date(pedido.created_at).toLocaleString('es-PE', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color: #a8a8b3; font-size: 14px;">${fecha}</td>
                    <td style="font-weight: bold;">${pedido.nickname}</td>
                    <td style="color: #00e676; font-weight: bold;">${pedido.paquete}</td>
                    <td style="font-family: monospace; font-size: 16px; letter-spacing: 1px;">${pedido.id_juego}</td>
                    <td><span class="status-pending">Pendiente</span></td>
                    <td>
                        <button class="btn-complete" onclick="completarPedido(${pedido.id}, '${pedido.paquete}', '${pedido.nickname}')">
                            <span class="material-icons" style="font-size: 18px;">check_circle</span> Completar
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function completarPedido(idPedido, paquete, nickname) {
            const confirmar = confirm(`¿Ya enviaste la recarga de ${paquete} a ${nickname} en el juego?`);
            if (!confirmar) return;

            // 1. Cambiamos el estado en la tabla 'pedidos' a 'Completado'
            const { error: errorPedido } = await supabaseClient
                .from('pedidos')
                .update({ estado: 'Completado' })
                .eq('id', idPedido);

            if (errorPedido) {
                alert("Error al completar el pedido.");
                return;
            }

            // 2. Opcional: Podemos guardar esto en el historial del cliente para que sepa que ya se entregó.
            await supabaseClient.from('historial').insert([{
                nickname: nickname,
                monto: 0, // No es ingreso de dinero, es gasto, el descuento ya se hizo al comprar
                tipo: `Entrega completada: ${paquete}`,
                estado: 'Entregado'
            }]);

            alert("¡Pedido marcado como completado!");
            cargarPedidos(); // Recargamos la tabla para que desaparezca
        }

        // ==========================================
        // LÓGICA DE USUARIOS (Igual que antes)
        // ==========================================
        async function cargarUsuarios() {
            const { data } = await supabaseClient.from('usuarios').select('*').order('created_at', { ascending: false });
            todosLosUsuarios = data || [];
            mostrarUsuarios(todosLosUsuarios);
        }

        function mostrarUsuarios(lista) {
            const tbody = document.getElementById('tabla-usuarios');
            tbody.innerHTML = "";
            if (lista.length === 0) return;

            lista.forEach(user => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight: bold;">${user.nickname}</td>
                    <td style="color: #a8a8b3;">${user.correo}</td>
                    <td>${user.celular || 'No registrado'}</td>
                    <td style="font-size: 18px; color: #a155ff; font-weight: bold;">S/ ${user.saldo.toFixed(2)}</td>
                    <td>
                        <button class="btn-add" onclick="añadirSaldo('${user.nickname}', ${user.saldo})">
                            <span class="material-icons" style="font-size: 18px;">add_circle</span> Añadir Saldo
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filtrarUsuarios() {
            const texto = document.getElementById('buscador').value.toLowerCase();
            const filtrados = todosLosUsuarios.filter(u => u.nickname.toLowerCase().includes(texto));
            mostrarUsuarios(filtrados);
        }

        async function añadirSaldo(nickname, saldoActual) {
            const montoTexto = prompt(`¿Cuánto saldo quieres AÑADIR a la cuenta de ${nickname}?\n\nSaldo actual: S/ ${saldoActual.toFixed(2)}`);
            if (!montoTexto) return;

            const monto = parseFloat(montoTexto);
            if (isNaN(monto) || monto <= 0) return alert("Monto inválido.");

            const { error } = await supabaseClient.from('usuarios').update({ saldo: saldoActual + monto }).eq('nickname', nickname);
            if (!error) {
                await supabaseClient.from('historial').insert([{ nickname, monto, tipo: 'Recarga Yape/Plin', estado: 'Completado' }]);
                alert(`¡Se añadieron S/ ${monto} a ${nickname}!`);
                cargarUsuarios();
            }
        }
    </script>
</body>
</html>
