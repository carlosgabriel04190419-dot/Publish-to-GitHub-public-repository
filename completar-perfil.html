<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarzaD'Cross | Un último paso</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="description" content="Completa tu perfil en CarzaD'Cross para empezar a recargar.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://carzadcross.com/completar-perfil.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CarzaD'Cross">
    <meta property="og:locale" content="es_PE">
    <meta property="og:title" content="CarzaD'Cross | Un último paso">
    <meta property="og:description" content="Completa tu perfil en CarzaD'Cross para empezar a recargar.">
    <meta property="og:image" content="https://carzadcross.com/hero-bg.jpg">
    <meta property="og:url" content="https://carzadcross.com/completar-perfil.html">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CarzaD'Cross | Un último paso">
    <meta name="twitter:description" content="Completa tu perfil en CarzaD'Cross para empezar a recargar.">
    <meta name="twitter:image" content="https://carzadcross.com/hero-bg.jpg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
</head>
<body class="login-body">

    <div class="login-container" style="max-width: 480px;">
        <div class="login-left">
            <div class="login-header">
                <div class="nav-logo-premium" style="pointer-events: none;">
                    <div class="logo-emblem" style="width: 38px; height: 38px;">
                        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
                            <defs>
                                <linearGradient id="gradLogoCP" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#a155ff;stop-opacity:1" />
                                </linearGradient>
                            </defs>
                            <path d="M50 5 L90 25 L90 70 L50 95 L10 70 L10 25 Z" fill="#121218" stroke="url(#gradLogoCP)" stroke-width="6" stroke-linejoin="round"/>
                            <path d="M60 35 A 20 20 0 1 0 60 65" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
                            <line x1="45" y1="25" x2="80" y2="75" stroke="#00d2ff" stroke-width="8" stroke-linecap="round"/>
                            <line x1="80" y1="25" x2="45" y2="75" stroke="#a155ff" stroke-width="8" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div class="logo-text" style="font-size: 19px;">
                        <span class="text-carza">Carza</span><span class="text-d">D'</span><span class="text-cross">Cross</span>
                    </div>
                </div>
            </div>

            <h1 class="login-title">¡Ya casi, <span id="saludo-nombre">Gamer</span>! 🎉</h1>
            <p class="login-subtitle">Solo nos falta tu WhatsApp para poder avisarte cuando tus recargas estén listas.</p>

            <div id="msg-box" style="display: none; background: rgba(255, 71, 87, 0.1); border: 1px solid #ff4757; color: #ff4757; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; text-align: center; font-weight: bold;"></div>

            <form class="login-form" onsubmit="return false;">
                <label>Número de WhatsApp <span style="color: #ff4757;">*</span></label>
                <div class="input-group reg-phone-group" style="display: flex; gap: 10px; padding: 0;">
                    <div style="background: rgba(0, 0, 0, 0.2); border-right: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; padding: 0 10px; border-top-left-radius: 8px; border-bottom-left-radius: 8px; flex-shrink: 0;">
                        <span class="material-icons" style="color: #666; font-size: 18px; margin-right: 5px;">smartphone</span>
                        <select id="cp-codigo-pais" onchange="alCambiarPais()" style="background: transparent; color: white; border: none; outline: none; font-size: 15px; cursor: pointer;">
                            <option value="51" data-digitos="9" selected style="color: black;">🇵🇪 +51</option>
                            <option value="52" data-digitos="10" style="color: black;">🇲🇽 +52</option>
                            <option value="57" data-digitos="10" style="color: black;">🇨🇴 +57</option>
                            <option value="54" data-digitos="10" style="color: black;">🇦🇷 +54</option>
                            <option value="56" data-digitos="9" style="color: black;">🇨🇱 +56</option>
                            <option value="58" data-digitos="10" style="color: black;">🇻🇪 +58</option>
                            <option value="593" data-digitos="9" style="color: black;">🇪🇨 +593</option>
                            <option value="591" data-digitos="8" style="color: black;">🇧🇴 +591</option>
                        </select>
                    </div>
                    <input type="tel" inputmode="numeric" id="cp-celular" placeholder="942 395 040" oninput="formatearCelularCP()" style="flex: 1; border: none; outline: none; background: transparent; color: white; padding: 14px; font-size: 15px; min-width: 0;" onkeydown="if(event.key === 'Enter') guardarPerfil()">
                </div>
                <p id="celular-hint" style="margin: -14px 0 20px 0; font-size: 11px; color: #6a6a78;">Perú: 9 dígitos</p>

                <button type="button" id="btn-guardar" class="btn-primary" style="width: 100%;" onclick="guardarPerfil()">Continuar a la Tienda</button>
                <p style="text-align:center; font-size:11px; color:#6a6a78; margin-top:15px;">Solo lo usamos para avisarte del estado de tus pedidos.</p>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://kskynakwlglwmliffcnx.supabase.co';
        const supabaseKey = 'sb_publishable_piAkvgxqryyzBfvbeIvTNw_MD_U4OjF';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        function mostrarError(mensaje) {
            const box = document.getElementById('msg-box');
            box.style.display = 'block';
            box.innerText = mensaje;
        }

        function digitosEsperados() {
            const sel = document.getElementById('cp-codigo-pais');
            return parseInt(sel.options[sel.selectedIndex].getAttribute('data-digitos'), 10);
        }
        function alCambiarPais() {
            document.getElementById('celular-hint').innerText = `${digitosEsperados()} dígitos esperados para este país`;
            formatearCelularCP();
        }
        function formatearCelularCP() {
            const input = document.getElementById('cp-celular');
            const max = digitosEsperados();
            let soloNumeros = input.value.replace(/\D/g, '').slice(0, max);
            const grupos = soloNumeros.match(/.{1,3}/g) || [];
            input.value = grupos.join(' ');
        }

        window.onload = async function() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = 'login.html'; return; }

            const { data: usuario } = await supabaseClient.from('usuarios').select('nickname, celular').eq('correo', session.user.email).single();
            if (!usuario) { window.location.href = 'login.html'; return; }

            if (usuario.celular) { window.location.href = 'index.html'; return; }

            document.getElementById('saludo-nombre').innerText = usuario.nickname;
        };

        async function guardarPerfil() {
            const celular = document.getElementById('cp-celular').value.replace(/\s/g, '').trim();
            const codigoPais = document.getElementById('cp-codigo-pais').value;
            const nDigitos = digitosEsperados();
            const btn = document.getElementById('btn-guardar');

            if (!celular || celular.length !== nDigitos) return mostrarError(`Ingresa un número de WhatsApp válido (${nDigitos} dígitos para este país).`);

            btn.disabled = true; btn.innerText = "Guardando...";

            const { data: { session } } = await supabaseClient.auth.getSession();
            const numeroCompleto = codigoPais + celular;
            await supabaseClient.from('usuarios').update({ celular: numeroCompleto }).eq('correo', session.user.email);

            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
