<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Datos | CarzaD'Cross</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <style>
        body {
            background: linear-gradient(rgba(10, 10, 14, 0.85), rgba(10, 10, 14, 0.95)), url('hero-bg.jpg') center/cover fixed no-repeat;
            background-color: #0f0f13;
            margin: 0;
            min-height: 100vh;
            color: white;
        }
        .glass-card {
            background: rgba(26, 26, 31, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            padding: 30px;
        }
        .input-form-profile {
            width: 100%; 
            background: rgba(0, 0, 0, 0.4); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 8px; 
            padding: 14px; 
            color: white; 
            font-size: 15px;
            outline: none; 
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        .input-form-profile:focus {
            border-color: #a155ff;
            box-shadow: 0 0 10px rgba(161, 85, 255, 0.2);
        }
        .phone-container {
            display: flex; 
            align-items: center; 
            background: rgba(0, 0, 0, 0.4); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 8px; 
            padding: 0 14px;
        }
    </style>
</head>
<body>
    
    <nav class="navbar">
        <div class="nav-logo" style="cursor: pointer;" onclick="window.location.href='index.html'">
            <div class="profile-avatar">C</div><span>CarzaD'Cross</span>
        </div>
        <button class="btn-outline" onclick="window.location.href='index.html'">Volver a la Tienda</button>
    </nav>

    <main class="container" style="padding-top: 50px; display: flex; gap: 30px; flex-wrap: wrap; justify-content: center;">
        
        <div style="flex: 1; min-width: 300px; max-width: 350px;">
            <div class="profile-header glass-card" style="padding: 20px;">
                <div class="profile-avatar large-avatar" style="box-shadow: 0 0 20px rgba(161,85,255,0.4);">C</div>
                <div class="profile-info">
                    <p class="greeting" style="color: #a155ff; font-weight: bold;">USUARIO,</p>
                    <h2 id="nombre-pantalla" style="font-size: 24px;">Cargando...</h2>
                </div>
            </div>
        </div>

        <div style="flex: 2; min-width: 300px; max-width: 600px;">
            <div class="glass-card" style="text-align: left; max-width: 100%;">
                <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 25px;">
                    <span class="material-icons" style="color: #a155ff; font-size: 32px; background: rgba(161,85,255,0.1); padding: 10px; border-radius: 50%;">manage_accounts</span>
                    <div>
                        <h2 style="font-size: 22px; color: white; margin: 0;">Mis Datos Personales</h2>
                        <p style="color: #a8a8b3; font-size: 14px; margin: 5px 0 0 0;">Modifica tu información. Los cambios se guardarán en la nube.</p>
                    </div>
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="color: #e0e0e0; font-size: 14px; margin-bottom: 8px; display: block; font-weight: 500;">Nickname (Nombre de usuario)</label>
                    <input type="text" id="edit-nickname" class="input-form-profile">
                </div>
                
                <div style="margin-bottom: 20px;">
                    <label style="color: #e0e0e0; font-size: 14px; margin-bottom: 8px; display: block; font-weight: 500;">Correo Electrónico (No se puede cambiar)</label>
                    <input type="email" id="edit-correo" class="input-form-profile" disabled style="opacity: 0.5; cursor: not-allowed;">
                </div>
                
                <div style="margin-bottom: 30px;">
                    <label style="color: #e0e0e0; font-size: 14px; margin-bottom: 8px; display: block; font-weight: 500;">Número de Celular</label>
                    <div class="phone-container">
                        <select id="edit-codigo-pais" style="background: transparent; border: none; color: white; outline: none; padding-right: 8px; border-right: 1px solid rgba(255,255,255,0.2); margin-right: 12px; cursor: pointer; font-size: 15px;">
                            <option value="+51" style="color: black;">🇵🇪 +51</option>
                            <option value="+56" style="color: black;">🇨🇱 +56</option>
                        </select>
                        <input type="tel" id="edit-celular" maxlength="11" placeholder="942 395 040" class="input-form-profile" style="border: none; background: transparent; padding-left: 0;">
                    </div>
                </div>

                <button class="btn-primary" style="width: 100%; display: flex; justify-content: center; align-items: center; gap: 10px; padding: 15px; font-size: 16px;" onclick="guardarCambios()">
                    <span class="material-icons">cloud_upload</span> Guardar Cambios
                </button>
            </div>
        </div>

        <div style="flex-basis: 100%; width: 100%; margin-top: 20px;">
            <div class="glass-card">
                <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
                    <span class="material-icons" style="color: #00e676; font-size: 28px;">history</span>
                    <h2 style="font-size: 20px; color: white; margin: 0;">Últimos Movimientos</h2>
                </div>
                
                <div style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse; min-width: 500px;">
                        <thead>
                            <tr style="border-bottom: 1px solid rgba(255,255,255,0.1); color: #a8a8b3;">
                                <th style="padding: 15px; text-align: left; font-weight: normal;">Fecha</th>
                                <th style="padding: 15px; text-align: left; font-weight: normal;">Detalle</th>
                                <th style="padding: 15px; text-align: right; font-weight: normal;">Monto</th>
                                <th style="padding: 15px; text-align: center; font-weight: normal;">Estado</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-historial">
                            <tr>
                                <td colspan="4" style="text-align: center; padding: 30px; color: #a8a8b3;">Cargando historial...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://kskynakwlglwmliffcnx.supabase.co';
        const supabaseKey = 'sb_publishable_piAkvgxqryyzBfvbeIvTNw_MD_U4OjF';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        const nombreActual = localStorage.getItem('nombreUsuario');

        window.onload = async function() {
            if (!nombreActual) { window.location.href = 'login.html'; return; }
            
            document.getElementById('nombre-pantalla').innerText = nombreActual;

            // 1. Traemos los datos de perfil
            const { data } = await supabaseClient.from('usuarios').select('*').eq('nickname', nombreActual).single();
            if (data) {
                document.getElementById('edit-nickname').value = data.nickname;
                document.getElementById('edit-correo').value = data.correo;
                
                // Separamos inteligentemente el código de país y el número
                if(data.celular) {
                    if (data.celular.includes('+56')) {
                        document.getElementById('edit-codigo-pais').value = '+56';
                        document.getElementById('edit-celular').value = data.celular.replace('+56', '').trim();
                    } else {
                        document.getElementById('edit-codigo-pais').value = '+51';
                        document.getElementById('edit-celular').value = data.celular.replace('+51', '').trim();
                    }
                }
            }

            // 2. Cargamos el historial
            const { data: historialData } = await supabaseClient
                .from('historial')
                .select('*')
                .eq('nickname', nombreActual)
                .order('created_at', { ascending: false });

            const tbody = document.getElementById('tabla-historial');
            if (historialData && historialData.length > 0) {
                tbody.innerHTML = '';
                historialData.forEach(mov => {
                    const fecha = new Date(mov.created_at).toLocaleDateString('es-PE', {
                        day: '2-digit', month: 'short', year: 'numeric'
                    });
                    
                    tbody.innerHTML += `
                        <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                            <td style="padding: 15px; color: white;">${fecha}</td>
                            <td style="padding: 15px; color: #e0e0e0;">${mov.tipo}</td>
                            <td style="padding: 15px; text-align: right; color: #00e676; font-weight: bold;">+ S/ ${mov.monto.toFixed(2)}</td>
                            <td style="padding: 15px; text-align: center;">
                                <span style="background: rgba(0,230,118,0.15); color: #00e676; padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: bold;">${mov.estado}</span>
                            </td>
                        </tr>
                    `;
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 30px; color: #a8a8b3;">Aún no tienes movimientos. ¡Haz tu primera recarga!</td></tr>';
            }
        };

        // 3. Bloqueador de letras y formateador de espacios en el celular
        document.getElementById('edit-celular').addEventListener('input', function(e) {
            let valor = e.target.value.replace(/\D/g, ''); 
            let formateado = '';
            if (valor.length > 0) formateado += valor.substring(0, 3);
            if (valor.length > 3) formateado += ' ' + valor.substring(3, 6);
            if (valor.length > 6) formateado += ' ' + valor.substring(6, 9);
            e.target.value = formateado;
        });

        // 4. Guardar cambios en la base de datos
        async function guardarCambios() {
            const nuevoNombre = document.getElementById('edit-nickname').value;
            const nuevoCelular = document.getElementById('edit-celular').value;
            const codigo = document.getElementById('edit-codigo-pais').value;
            const celularFinal = `${codigo} ${nuevoCelular}`;

            const { error } = await supabaseClient
                .from('usuarios')
                .update({ 
                    nickname: nuevoNombre, 
                    celular: celularFinal 
                })
                .eq('nickname', nombreActual);

            if (error) {
                alert("Error al guardar: " + error.message);
            } else {
                alert("¡Datos actualizados con éxito!");
                localStorage.setItem('nombreUsuario', nuevoNombre);
                window.location.reload();
            }
        }
    </script>
</body>
</html>
